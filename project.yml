name: AxorcistQueryApp
options:
  minimumXcodeGenVersion: 2.44.0
  deploymentTarget:
    macOS: "14.0"
packages:
  AXorcist:
    path: ../axorcist
targets:
  AxorcistQueryApp:
    type: application
    platform: macOS
    sources:
      - AxorcistQueryApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.axorcist.queryapp
        PRODUCT_NAME: AxorcistQueryApp
        SWIFT_VERSION: 6.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Axorcist Query App
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: 14.0
    dependencies:
      - package: AXorcist
        product: AXorcist
    scheme:
      testTargets: []
