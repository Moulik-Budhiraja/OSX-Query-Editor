name: OSXQueryEditor
options:
  minimumXcodeGenVersion: 2.44.0
  deploymentTarget:
    macOS: "14.0"
packages:
  OSXQuery:
    url: https://github.com/Moulik-Budhiraja/OSX-Query
    branch: main
targets:
  OSXQueryEditor:
    type: application
    platform: macOS
    sources:
      - OSXQueryEditor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.osx.queryeditor
        PRODUCT_NAME: OSXQueryEditor
        SWIFT_VERSION: 6.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: OSX Query Editor
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: 14.0
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: OSXQuery
        product: OSXQuery
    scheme:
      testTargets: []
